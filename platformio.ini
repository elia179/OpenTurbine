; OpenTurbine — Universal Turbine ECU
; Targets: ESP32 (env:esp32dev) and ESP32-S3 (env:esp32s3dev)
; Arduino-ESP32 core 3.x (IDF5 / pioarduino)

[platformio]
build_dir = .pio3

; ── Shared settings ──────────────────────────────────────────
[common]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
board_build.filesystem  = littlefs
board_build.partitions  = partitions.csv
lib_deps =
    ESP32Async/ESPAsyncWebServer @ ^3.10.0
    ESP32Async/AsyncTCP @ ^3.4.10
    bblanchon/ArduinoJson @ ^7.4.3
    adafruit/MAX6675 library
    ; adafruit/Adafruit MAX31855 library  ← replaced by direct SPI in MAX31855TempSensor.h
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    -I.                  ; project root on include path — makes hardware_profile.h findable from any .cpp
    -mtext-section-literals  ; keep IRAM literal pools adjacent to ISR code (avoids Xtensa l32r reloc error)
    -DCONFIG_ASYNC_TCP_USE_WDT=0  ; AsyncTCP 3.x subscribes itself to TWDT and blocks on portMAX_DELAY → WDT reboot every ~5s
    -DCONFIG_ASYNC_TCP_QUEUE_SIZE=128  ; default 32 — captive-portal HTTP+DNS bursts can fill the queue and drop WS "p" events
    -DWS_MAX_QUEUED_MESSAGES=1
    ; Arduino-ESP32's default static-allocation hook obtains the FreeRTOS timer
    ; task stack from pvPortMalloc before setup(). The classic target's heavily
    ; segmented early DRAM can have no contiguous 4 KiB block even though total
    ; runtime memory is sufficient. Provide that mandatory kernel memory from a
    ; compile-time buffer so an otherwise valid ECU can never boot-loop here.
    -Wl,--wrap=vApplicationGetTimerTaskMemory
monitor_speed = 115200

; ── ESP32 classic ─────────────────────────────────────────────
; ADC1: GPIO 32–39  |  SPI MISO: GPIO 19  |  SPI CLK: GPIO 5
[env:esp32dev]
extends     = common
board       = esp32dev
build_flags =
    ${common.build_flags}
    -DOT_PLATFORM_ESP32
extra_scripts = pre:tools/pio_s3_dynconfig.py
; Port auto-detected by PlatformIO. Override per run if needed:
;   pio run -e esp32dev -t upload --upload-port COMx
upload_flags =
    --before=no_reset
    --after=hard_reset

; ── ESP32-S3 ──────────────────────────────────────────────────
; ADC1: GPIO 1–10   |  SPI MISO: GPIO 37  |  SPI CLK: GPIO 36
; GPIO 19/20 = USB D−/D+ — never assign to any peripheral.
; This environment explicitly defines OT_PLATFORM_ESP32S3 so firmware,
; web config defaults, and status LED backend use the S3 path consistently.
[env:esp32s3dev]
extends      = common
board        = esp32-s3-devkitc-1
; Tested S3 target: ESP32-S3-DevKitC-1-compatible module with 16 MB flash.
; OpenTurbine fits in internal RAM and deliberately leaves PSRAM disabled:
; Octal-PSRAM initialization on this supported bench module can stall before
; setup() after ESP.restart(), while cold power-on succeeds. Disabling unused
; PSRAM makes Hardware Save, restore, factory reset, and OTA warm reboots reliable.
; Keep the explicit 16 MB flash declaration and matching partition table so
; esptool, bootloader, OTA slots, and LittleFS agree on the chip geometry.
board_build.flash_size  = 16MB
board_upload.flash_size = 16MB
board_build.partitions  = partitions_16mb.csv
build_flags =
    ${common.build_flags}
    -DOT_PLATFORM_ESP32S3
; Port auto-detected by PlatformIO. Override per run if needed:
;   pio run -e esp32s3dev -t upload --upload-port COMx
extra_scripts = pre:tools/pio_s3_dynconfig.py
upload_flags =
    --before=default_reset
    --after=hard_reset
