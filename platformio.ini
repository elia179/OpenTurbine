; OpenTurbine — Universal Turbine ECU
; Target: ESP32 Dev Module, Arduino-ESP32 core 3.x (IDF5 / pioarduino)

[platformio]
build_dir = .pio3

[env:esp32dev]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32dev
framework = arduino
upload_port = COM3
monitor_port = COM3
upload_flags =
    --before=default_reset
    --after=hard_reset

board_build.filesystem  = littlefs
board_build.partitions  = partitions.csv

lib_deps =
    ESP32Async/ESPAsyncWebServer @ ^3.10.0
    ESP32Async/AsyncTCP @ ^3.4.10
    bblanchon/ArduinoJson @ ^7.4.3
    madhephaestus/ESP32Servo
    adafruit/MAX6675 library
    ; adafruit/Adafruit MAX31855 library  ← replaced by direct SPI in MAX31855TempSensor.h

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    -I.                  ; project root on include path — makes hardware_profile.h findable from any .cpp
    -mtext-section-literals  ; keep IRAM literal pools adjacent to ISR code (avoids Xtensa l32r reloc error)

monitor_speed = 115200
