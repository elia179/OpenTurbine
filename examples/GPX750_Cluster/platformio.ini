; GPX750_Cluster — Kawasaki GPX750 R 1988 Instrument Cluster
; OpenTurbine-compatible build: OTComm protocol v2, Wi-Fi AP config, OTA.
; BtConfig removed; WifiConfig replaces it.
;
; Two board environments — pin assignments differ in KicConfig.h only.
; Flash with:  pio run -e esp32dev --target upload
; Monitor:     pio device monitor

[common]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_speed = 115200

board_build.filesystem = littlefs   ; LittleFS used for /cluster_cfg.json

lib_deps =
    ESP32Async/ESPAsyncWebServer @ ^3.10.0
    ESP32Async/AsyncTCP          @ ^3.4.10
    bblanchon/ArduinoJson        @ ^7.4.3
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0

; ── Original ESP32 build ──────────────────────────────────────────────────────
[env:esp32dev]
extends = common
board   = esp32dev

; ── ESP32-S3 build ────────────────────────────────────────────────────────────
; Update pin assignments in KicConfig.h for your S3 wiring.
; S3: ADC2 unavailable with WiFi active — FUEL_SENSOR_PIN must be ADC1 (GPIO 1-10).
[env:esp32s3dev]
extends = common
board   = esp32-s3-devkitc-1
