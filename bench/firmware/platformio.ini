; OTBench — HIL tester firmware for the OpenTurbine bench rig.
; Runs on a classic ESP32 wired pin-to-pin to an ESP32-S3 running OpenTurbine.
; It is a dumb I/O slave: the PC harness drives it over USB serial (115200).
;
; Same Arduino-ESP32 3.x (IDF5) core as OpenTurbine, so the v3 LEDC API
; (ledcAttach / ledcWrite(pin,duty) / ledcWriteTone) is available.
;
; Build & flash from this folder:  pio run -t upload
; Then leave it plugged in — the harness talks to it on its COM port.

[env:otbench]
platform     = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework    = arduino
board        = esp32dev
build_flags  =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
monitor_speed = 115200
upload_port  = COM3
monitor_port = COM3
; This classic ESP32's USB auto-reset into bootloader does not work (esptool
; reports "wrong boot mode 0x13"), so flashing needs manual download-mode entry
; — same as OpenTurbine's own esp32dev env. Enter download mode (hold BOOT, tap
; EN/RST, release BOOT) before uploading; these flags stop esptool toggling out
; of it.
upload_flags =
    --before=no_reset
    --after=hard_reset
