name: Release checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  web-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Verify generated web assets
        run: |
          python3 tools/gzip_data.py
          git diff --exit-code -- data
      - name: Run every browser audit
        run: npm run audit:ui

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install platformio==6.1.19
      - run: python tools/gzip_data.py
      - name: Build classic ESP32 firmware and filesystem
        run: |
          pio run -e esp32dev
          pio run -e esp32dev -t buildfs
          python tools/check_firmware_budget.py \
            --partitions partitions.csv \
            --firmware .pio3/esp32dev/firmware.bin \
            --filesystem .pio3/esp32dev/littlefs.bin \
            --app-reserve 0x10000
      - name: Build ESP32-S3 firmware and filesystem
        run: |
          pio run -e esp32s3dev
          pio run -e esp32s3dev -t buildfs
          python tools/check_firmware_budget.py \
            --partitions partitions_16mb.csv \
            --firmware .pio3/esp32s3dev/firmware.bin \
            --filesystem .pio3/esp32s3dev/littlefs.bin \
            --app-reserve 0x20000

  package-builder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m unittest tools/test_build_setup_package.py

  windows-installer:
    runs-on: windows-latest
    env:
      WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
    defaults:
      run:
        working-directory: tools/setup_tool
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: tools/setup_tool/go.mod
          cache-dependency-path: tools/setup_tool/go.mod
      - name: Format Go files
        shell: pwsh
        run: |
          $files = Get-ChildItem -Filter *.go | ForEach-Object { $_.FullName }
          gofmt -w $files
      - name: Require committed Go formatting
        working-directory: .
        run: git diff --exit-code -- tools/setup_tool
      - run: go test ./...
      - name: Generate Windows icon and manifest resources
        run: go run github.com/akavel/rsrc@v0.10.2 -ico OpenTurbineSetupTool.ico -manifest OpenTurbineSetupTool.manifest -o rsrc_windows_amd64.syso
      - run: go build -ldflags="-H windowsgui -s -w" -o OpenTurbineSetupTool.exe .
      - name: Sign setup tool when a signing certificate is configured
        if: env.WINDOWS_SIGNING_CERT_BASE64 != ''
        env:
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "OpenTurbineCodeSigning.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64))
          try {
            & ..\sign_windows_setup_tool.ps1 `
              -ExePath .\OpenTurbineSetupTool.exe `
              -CertificatePath $certPath `
              -CertificatePassword $env:WINDOWS_SIGNING_CERT_PASSWORD
          } finally {
            Remove-Item -LiteralPath $certPath -Force -ErrorAction SilentlyContinue
          }
      - name: Write setup tool SHA-256
        shell: pwsh
        run: |
          $hash = (Get-FileHash .\OpenTurbineSetupTool.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  OpenTurbineSetupTool.exe" | Set-Content -Encoding ascii .\OpenTurbineSetupTool.exe.sha256
      - name: Upload setup tool artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenTurbineSetupTool
          path: |
            tools/setup_tool/OpenTurbineSetupTool.exe
            tools/setup_tool/OpenTurbineSetupTool.exe.sha256
