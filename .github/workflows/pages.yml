name: Build and deploy public site

on:
  push:
    branches: [main]
    paths:
      - site/**
      - docs/**
      - README.md
      - tools/validate_public_content.py
      - .github/workflows/pages.yml
  pull_request:
    paths:
      - site/**
      - docs/**
      - README.md
      - tools/validate_public_content.py
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v5
      - name: Validate public content
        run: python3 tools/validate_public_content.py
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site
          future: true
      - name: Validate generated metadata, sitemap, links, anchors, images, and JSON-LD
        run: python3 tools/validate_public_content.py --built _site
      - uses: actions/upload-pages-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          path: ./_site
  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
