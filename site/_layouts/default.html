<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: page.lede | default: site.description | strip_html | normalize_whitespace | escape }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} &middot; {% endif %}{{ site.title }}">
    <meta property="og:description" content="{{ page.description | default: page.lede | default: site.description | strip_html | normalize_whitespace | escape }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ site.data.project.social_preview | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title | default: site.title | escape }}">
    <meta name="twitter:description" content="{{ page.description | default: page.lede | default: site.description | strip_html | normalize_whitespace | escape }}">
    <meta name="twitter:image" content="{{ site.data.project.social_preview | absolute_url }}">
    <meta name="theme-color" content="#0c1218">
    <title>{% if page.title %}{{ page.title }} &middot; {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>
    {% include header.html %}
    <main id="content">{{ content }}</main>
    {% include footer.html %}
    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
