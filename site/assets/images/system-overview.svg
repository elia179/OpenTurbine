<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 700" role="img" aria-labelledby="title description">
  <title id="title">OpenTurbine system overview</title><desc id="description">Sensors and controls connect to an ESP32 running OpenTurbine. It serves a browser dashboard and controls driver electronics, which control engine loads. A physical emergency stop independently cuts fuel and load power.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0 9 3 0 6z" fill="#b8c5d1"/></marker><marker id="stop" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0 9 3 0 6z" fill="#ff7373"/></marker></defs>
  <style>.box{fill:#17212b;stroke:#ff6a00;stroke-width:3}.line{stroke:#b8c5d1;stroke-width:4;marker-end:url(#arrow)}.stop{stroke:#ff7373;stroke-width:4;marker-end:url(#stop)}.h{font:700 27px Arial,sans-serif;fill:#f8fafc}.t{font:500 20px Arial,sans-serif;fill:#cbd5e1}.s{font:700 19px Arial,sans-serif;fill:#fecaca}</style>
  <rect width="1120" height="700" fill="#0c1218"/>
  <rect class="box" x="75" y="70" width="260" height="112" rx="16"/><text class="h" x="105" y="115">Sensors / controls</text><text class="t" x="105" y="149">RPM · temperature · switches</text>
  <rect class="box" x="430" y="70" width="260" height="112" rx="16"/><text class="h" x="463" y="115">ESP32 + OpenTurbine</text><text class="t" x="463" y="149">Sequences · limits · logging</text>
  <rect class="box" x="785" y="70" width="260" height="112" rx="16"/><text class="h" x="834" y="115">Browser dashboard</text><text class="t" x="831" y="149">Wi-Fi configuration</text>
  <path class="line" d="M335 126h90M690 126h90"/>
  <rect class="box" x="430" y="300" width="260" height="112" rx="16"/><text class="h" x="460" y="345">Driver electronics</text><text class="t" x="467" y="379">Protected interfaces</text>
  <path class="line" d="M560 182v108"/>
  <rect class="box" x="380" y="530" width="360" height="100" rx="16"/><text class="h" x="428" y="570">Engine loads</text><text class="t" x="413" y="603">Pumps · valves · starter · ignition</text>
  <path class="line" d="M560 412v108"/>
  <rect x="70" y="302" width="240" height="108" rx="16" fill="#321b20" stroke="#ff7373" stroke-width="3"/><text class="s" x="100" y="344">Physical emergency stop</text><text class="t" x="99" y="376">Independent fuel/load cut</text>
  <path class="stop" d="M310 356h62v224"/><path class="stop" d="M372 580h-24"/>
</svg>
