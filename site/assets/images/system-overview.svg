<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="t d"><title id="t">OpenTurbine system overview</title><desc id="d">Sensors and controls feed an ESP32 running OpenTurbine. It connects to a browser dashboard and controls driver electronics, which control loads. An independent physical emergency stop removes fuel and load power.</desc><style>text{font:600 24px Arial;fill:#f8fafc}.box{fill:#17212b;stroke:#ff6a00;stroke-width:3}.line{stroke:#b8c5d1;stroke-width:4;marker-end:url(#a)}.stop{stroke:#ef4444;stroke-width:4;marker-end:url(#r)}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0 9 3 0 6z" fill="#b8c5d1"/></marker><marker id="r" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0 9 3 0 6z" fill="#ef4444"/></marker></defs><rect width="1000" height="520" fill="#0c1218"/><rect class="box" x="50" y="170" width="210" height="110" rx="14"/><text x="77" y="215">Sensors and</text><text x="77" y="247">controls</text><rect class="box" x="395" y="170" width="220" height="110" rx="14"/><text x="425" y="215">ESP32 running</text><text x="425" y="247">OpenTurbine</text><rect class="box" x="740" y="170" width="210" height="110" rx="14"/><text x="764" y="215">Driver</text><text x="764" y="247">electronics</text><path class="line" d="M260 225h130M615 225h125"/><rect class="box" x="395" y="365" width="220" height="80" rx="14"/><text x="424" y="413">Browser dashboard</text><path class="line" d="M505 280v80"/><text x="758" y="335">Pumps · valves · starter · ignition</text><path class="stop" d="M112 442H738"/><text x="55" y="490" fill="#fca5a5">Physical emergency stop independently removes fuel / load power</text></svg>
