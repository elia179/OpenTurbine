<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1040" viewBox="0 0 1400 1040" role="img" aria-labelledby="title desc">
  <title id="title">Basic sensor and switch wiring to an ESP32 ECU</title>
  <desc id="desc">Four simple wiring examples: a 3.3 volt three-wire sensor, a 5 volt analog sensor through a voltage divider, an open-collector pulse sensor with a pull-up, and an active-low switch.</desc>
  <defs>
    <style>
      .bg{fill:#0c1218}.panel{fill:#17212b;stroke:#526575;stroke-width:3}.ecu{fill:#24313d;stroke:#ff6a00;stroke-width:3}.device{fill:#111820;stroke:#8293a1;stroke-width:3}.title{fill:#eef4f8;font:700 28px Arial,sans-serif}.label{fill:#eef4f8;font:700 20px Arial,sans-serif}.note{fill:#c8d3dc;font:17px Arial,sans-serif}.tiny{fill:#c8d3dc;font:15px Arial,sans-serif}.v{stroke:#ff655f}.g{stroke:#aab6c0}.s{stroke:#59b7ff}.wire{fill:none;stroke-width:5}.dot{fill:#eef4f8}.res{fill:#39291d;stroke:#ffb05f;stroke-width:3}.warn{fill:#ffd0cd;font:700 16px Arial,sans-serif}.ok{fill:#9be9bd;font:700 16px Arial,sans-serif}
    </style>
  </defs>
  <rect class="bg" width="1400" height="1040"/>
  <text class="title" x="50" y="52">Basic OpenTurbine input wiring</text>
  <text class="note" x="50" y="84">Red = power, grey = ground, blue = signal. GPIO numbers come from your saved Hardware page.</text>

  <g transform="translate(50 120)">
    <rect class="panel" width="630" height="390" rx="18"/>
    <text class="title" x="28" y="45">1. Three-wire 3.3 V sensor</text>
    <rect class="ecu" x="30" y="90" width="190" height="210" rx="14"/><text class="label" x="82" y="125">ESP32</text>
    <text class="note" x="55" y="175">3V3</text><text class="note" x="55" y="225">GND</text><text class="note" x="55" y="275">ADC / GPIO</text>
    <rect class="device" x="410" y="90" width="185" height="210" rx="14"/><text class="label" x="452" y="125">Sensor</text>
    <text class="note" x="445" y="175">VCC</text><text class="note" x="445" y="225">GND</text><text class="note" x="445" y="275">OUT</text>
    <path class="wire v" d="M120 168 H445"/><path class="wire g" d="M120 218 H445"/><path class="wire s" d="M150 268 H445"/>
    <text class="ok" x="30" y="340">Use only when VCC and OUT are both 3.3 V compatible.</text>
    <text class="tiny" x="30" y="367">Examples: a suitable 3.3 V pressure module or conditioned digital sensor.</text>
  </g>

  <g transform="translate(720 120)">
    <rect class="panel" width="630" height="390" rx="18"/>
    <text class="title" x="28" y="45">2. 5 V analog sensor</text>
    <rect class="ecu" x="30" y="90" width="170" height="210" rx="14"/><text class="label" x="73" y="125">ESP32</text>
    <text class="note" x="55" y="225">GND</text><text class="note" x="55" y="275">ADC</text>
    <rect class="device" x="425" y="90" width="175" height="210" rx="14"/><text class="label" x="463" y="125">Sensor</text>
    <text class="note" x="455" y="170">+5 V</text><text class="note" x="455" y="220">GND</text><text class="note" x="455" y="270">OUT</text>
    <path class="wire v" d="M425 163 H365 V78"/><text class="tiny" x="330" y="67">regulated 5 V</text>
    <path class="wire g" d="M110 218 H455"/>
    <path class="wire s" d="M455 263 H350"/>
    <rect class="res" x="315" y="245" width="38" height="75"/><text class="tiny" x="300" y="342">R1</text>
    <circle class="dot" cx="280" cy="282" r="6"/><path class="wire s" d="M315 282 H110"/>
    <rect class="res" x="260" y="310" width="38" height="55"/><text class="tiny" x="305" y="365">R2 to GND</text><path class="wire g" d="M279 365 V375 H110 V218"/>
    <text class="warn" x="30" y="340">R1/R2 must keep ADC at or below its safe maximum.</text>
    <text class="tiny" x="30" y="367">Calculate for the sensor fault maximum, then measure before connecting ADC.</text>
  </g>

  <g transform="translate(50 550)">
    <rect class="panel" width="630" height="420" rx="18"/>
    <text class="title" x="28" y="45">3. Open-collector pulse sensor</text>
    <rect class="ecu" x="30" y="100" width="190" height="210" rx="14"/><text class="label" x="82" y="135">ESP32</text>
    <text class="note" x="55" y="185">3V3</text><text class="note" x="55" y="235">GND</text><text class="note" x="55" y="285">Pulse GPIO</text>
    <rect class="device" x="415" y="100" width="180" height="210" rx="14"/><text class="label" x="448" y="135">RPM / flow</text>
    <text class="note" x="450" y="185">VCC*</text><text class="note" x="450" y="235">GND</text><text class="note" x="450" y="285">OUT</text>
    <path class="wire g" d="M120 228 H450"/><path class="wire s" d="M150 278 H450"/>
    <rect class="res" x="300" y="145" width="38" height="85"/><text class="tiny" x="347" y="180">4.7k pull-up</text>
    <path class="wire v" d="M120 178 H319 V145"/><path class="wire s" d="M319 230 V278"/>
    <text class="warn" x="30" y="350">*Power the sensor only as its datasheet specifies.</text>
    <text class="tiny" x="30" y="378">The pull-up goes to 3.3 V, never 5 V. A magnetic pickup needs a conditioner,</text>
    <text class="tiny" x="30" y="400">not this direct circuit.</text>
  </g>

  <g transform="translate(720 550)">
    <rect class="panel" width="630" height="420" rx="18"/>
    <text class="title" x="28" y="45">4. Active-LOW command switch</text>
    <rect class="ecu" x="30" y="100" width="200" height="210" rx="14"/><text class="label" x="82" y="135">ESP32</text>
    <text class="note" x="55" y="185">3V3</text><text class="note" x="55" y="235">GND</text><text class="note" x="55" y="285">Start/Stop GPIO</text>
    <path class="wire v" d="M120 178 H320"/><rect class="res" x="300" y="178" width="38" height="80"/><text class="tiny" x="350" y="213">pull-up</text>
    <circle class="dot" cx="319" cy="278" r="6"/><path class="wire s" d="M160 278 H480"/>
    <circle cx="480" cy="278" r="10" fill="none" stroke="#eef4f8" stroke-width="4"/><circle cx="555" cy="278" r="10" fill="none" stroke="#eef4f8" stroke-width="4"/>
    <path d="M485 265 L545 235" stroke="#eef4f8" stroke-width="5"/><text class="note" x="455" y="210">push switch</text>
    <path class="wire g" d="M555 278 V228 H120"/>
    <text class="ok" x="30" y="350">Open = HIGH (inactive). Pressed = GND (active).</text>
    <text class="tiny" x="30" y="378">Select Active LOW plus pull-up in Hardware. This is only an ECU command.</text>
    <text class="warn" x="30" y="402">A separate hardwired emergency stop must remove hazardous energy.</text>
  </g>
</svg>
